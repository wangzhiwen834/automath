# ===================================================================
# 数学建模多Agent系统 配置文件
# ===================================================================

# 工作目录：所有任务文件存这里（绝对路径或相对项目根）
workspace_dir: "./workspace"

# 默认模型：model_registry 中的 key
default_model: "deepseek-v4-pro"

# ===================================================================
# 模型注册表
# 每个模型定义 provider / base_url / model名 / api_key环境变量名
# 国产三家都是 OpenAI 兼容接口，复用 openai-compatible provider
# ===================================================================
model_registry:
  # ---------- DeepSeek ----------
  deepseek-v4-pro:
    provider: "openai-compatible"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-v4-pro"
    api_key_env: "DEEPSEEK_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  deepseek-chat:
    provider: "openai-compatible"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  deepseek-reasoner:
    provider: "openai-compatible"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-reasoner"
    api_key_env: "DEEPSEEK_API_KEY"
    max_tokens: 16384
    temperature: 0.5

  # ---------- 通义千问 ----------
  qwen-plus:
    provider: "openai-compatible"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  qwen-max:
    provider: "openai-compatible"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-max"
    api_key_env: "DASHSCOPE_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  # ---------- 智谱 GLM ----------
  glm-4.7:
    provider: "openai-compatible"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4.7"
    api_key_env: "ZHIPU_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  glm-4-plus:
    provider: "openai-compatible"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-plus"
    api_key_env: "ZHIPU_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  glm-4-flash:
    provider: "openai-compatible"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-flash"
    api_key_env: "ZHIPU_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  # ---------- Claude (可选) ----------
  claude-sonnet-5:
    provider: "anthropic"
    model: "claude-sonnet-5"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.7

  claude-opus-4-8:
    provider: "anthropic"
    model: "claude-opus-4-8"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.7

# ===================================================================
# 各 Agent 角色默认模型（可被任务级配置覆盖）
# 建议关键环节用更强模型，简单环节用快模型省钱
# ===================================================================
agent_models:
  analyst: "deepseek-v4-pro"      # 问题分析
  modeler: "deepseek-v4-pro"      # 建模
  solver: "deepseek-v4-pro"       # 写求解代码
  writer: "deepseek-v4-pro"       # 写论文
  reviewer: "deepseek-v4-pro"     # 审查

# ===================================================================
# 流水线配置（消融实验用）
# ===================================================================
pipeline:
  # 跳过总结师(事实清单)：true 时写作直接读求解原始输出(消融基线, 编造风险更高)
  skip_summarizer: false

# ===================================================================
# 求解 Agent 代码执行配置
# ===================================================================
solver:
  # 求解架构：staged=分阶段(规划+逐阶段+分层校验, 默认) / monolithic=单体脚本(消融基线)
  architecture: "staged"
  execution_timeout: 60
  stage_execution_timeout: 120
  workdir: "artifacts/solution"
  preamble_seed: 42
  max_stage_retries: 2
  max_critique_retries: 1
  max_regen_per_stage: 3
  self_critique_model: null
  self_critique_enabled: true      # false 时跳过 LLM 自查(E3 消融)
  allowed_packages:
    - numpy
    - pandas
    - scipy
    - matplotlib
    - scikit-learn
    - networkx
    - sympy
    - pulp

# ===================================================================
# 写作 Agent 配置
# ===================================================================
writer:
  min_section_chars:
    abstract: 400
    solving_sub: 600
    default: 300
  max_expand_sections: 4
  consistency_check: true
  consistency_model: null

# ===================================================================
# 审查 Agent 配置
# ===================================================================
reviewer:
  # 最大重试次数（审查不通过时回退到对应 Agent 重做）
  max_retries: 2
  # 通过分数阈值（0-100）
  pass_threshold: 75
